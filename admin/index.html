<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin – Kitri Jaya CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body class="login-body">
  <div class="login-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="/images/logo.png" alt="Kitri Jaya" class="brand-logo" style="width: 48px; height: 48px; object-fit: contain; margin-bottom: 12px;" />
        <span>Kitri Jaya</span>
      </div>
      <h1 class="login-title">Admin CMS</h1>
      <p class="login-subtitle">Masuk untuk mengelola konten website</p>
      <div id="login-alert" class="alert" style="display:none"></div>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label class="form-label"><i class="fas fa-user"></i> Username</label>
          <input type="text" id="username" class="form-control" placeholder="Masukkan username" required />
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Password</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="Masukkan password" required />
            <button type="button" class="input-icon" onclick="togglePass()"><i class="fas fa-eye" id="eye-icon"></i></button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="btn-login">
          <i class="fas fa-sign-in-alt"></i> Masuk
        </button>
      </form>
    </div>
    <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> Kembali ke Website</a>
  </div>
  <script>
    if (localStorage.getItem('admin_token')) window.location.href = '/admin/dashboard';
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const alert = document.getElementById('login-alert');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = '/admin/dashboard';
        } else {
          alert.style.display = 'flex';
          alert.className = 'alert alert-danger';
          alert.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${data.message}`;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
          btn.disabled = false;
        }
      } catch {
        alert.style.display = 'flex';
        alert.className = 'alert alert-danger';
        alert.innerHTML = '<i class="fas fa-exclamation-circle"></i> Gagal terhubung ke server';
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
        btn.disabled = false;
      }
    });
    function togglePass() {
      const inp = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
      else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
    }
  </script>
</body>
</html>
