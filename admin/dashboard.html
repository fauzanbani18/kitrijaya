<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin – Kitri Jaya CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <!-- Quill Rich Text Editor -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
</head>
<body class="dashboard-body">
  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="/images/logo.png" alt="Kitri Jaya" class="brand-logo" style="width: 32px; height: 32px; object-fit: contain; margin-right: 12px;" />
      <span class="brand-name">Kitri Jaya</span>
      <button class="sidebar-close" id="sidebar-close"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="dashboard"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
      <a href="#" class="nav-item" data-section="hero"><i class="fas fa-image"></i><span>Hero Section</span></a>
      <a href="#" class="nav-item" data-section="about"><i class="fas fa-store"></i><span>Tentang Toko</span></a>
      <a href="#" class="nav-item" data-section="categories"><i class="fas fa-tags"></i><span>Kategori</span></a>
      <a href="#" class="nav-item" data-section="products"><i class="fas fa-box-open"></i><span>Produk</span></a>
      <a href="#" class="nav-item" data-section="testimonials"><i class="fas fa-star"></i><span>Testimoni</span></a>
      <a href="#" class="nav-item" data-section="articles"><i class="fas fa-newspaper"></i><span>Artikel</span></a>
      <a href="#" class="nav-item" data-section="books"><i class="fas fa-book"></i><span>Buku Saku</span></a>
      <a href="#" class="nav-item" data-section="songs"><i class="fas fa-music"></i><span>Lagu Pramuka</span></a>
      <a href="#" class="nav-item" data-section="contact"><i class="fas fa-phone"></i><span>Kontak</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank" class="nav-item"><i class="fas fa-external-link-alt"></i><span>Lihat Website</span></a>
      <button class="nav-item logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Keluar</span></button>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main-wrap">
    <header class="topbar">
      <button class="topbar-menu" id="topbar-menu"><i class="fas fa-bars"></i></button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <span class="topbar-admin"><i class="fas fa-user-shield"></i> Admin</span>
      </div>
    </header>

    <main class="content" id="main-content">
      <!-- Content loaded by JS -->
    </main>
  </div>

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Modal</h3>
        <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn-admin btn-secondary" id="modal-cancel">Batal</button>
        <button class="btn-admin btn-primary" id="modal-confirm">Simpan</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="/admin/js/admin.js"></script>
</body>
</html>
